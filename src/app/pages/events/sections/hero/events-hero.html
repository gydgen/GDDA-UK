<section class="events-hero" aria-label="Events hero">
  <!-- Background image -->
  <div class="events-hero__bg" aria-hidden="true">
    <img
      ngSrc="/assets/images/events-hero-bg.jpg"
      alt=""
      fill
      priority
      class="events-hero__bg-img"
    />
    <div class="events-hero__gradient"></div>
  </div>

  <!-- Content -->
  <div class="events-hero__content">
    <div class="events-hero__content-inner">
      <div class="section-badge section-badge--gold events-hero__badge">
        Events &amp; Conferences
      </div>

      <h1 class="events-hero__heading">
        Where Excellence<br />Meets Community
      </h1>

      <p class="events-hero__description">
        Join us at our annual conferences, webinars, and networking events
        designed to keep Ghana's healthcare diaspora connected and informed.
      </p>
    </div>
  </div>
</section>
