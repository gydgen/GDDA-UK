<section class="gi-hero" aria-label="Get Involved hero">
  <!-- Background image -->
  <div class="gi-hero__bg" aria-hidden="true">
    <img
      ngSrc="/assets/images/get-involved-bg.jpg"
      alt=""
      fill
      priority
      class="gi-hero__bg-img"
    />
    <div class="gi-hero__gradient"></div>
  </div>

  <!-- Content -->
  <div class="gi-hero__content">
    <div class="gi-hero__content-inner">
      <div class="section-badge section-badge--gold gi-hero__badge">
        GET INVOLVED
      </div>

      <h1 class="gi-hero__heading">Make a Difference Today</h1>

      <p class="gi-hero__description">
        Whether you're a healthcare professional, student, or passionate supporter
        — there's a place for you in the GDDA-UK family.
      </p>
    </div>
  </div>
</section>
