<section class="contact" aria-labelledby="contact-heading">
  <div class="contact__inner">

    <!-- Left: Info -->
    <div class="contact__info">
      <h2 class="contact__heading" id="contact-heading">Get in Touch</h2>
      <p class="contact__subheading">
        Have questions about membership, events, or how to support our projects?
        Our team is here to help.
      </p>

      <div class="contact__details">
        <div class="contact__detail">
          <span class="contact__detail-label">Email Us</span>
          <a class="contact__detail-value" href="mailto:info@gdda-uk.org">info&#64;gdda-uk.org</a>
        </div>
        <div class="contact__detail">
          <span class="contact__detail-label">Headquarters</span>
          <span class="contact__detail-value">London, United Kingdom</span>
        </div>
      </div>

      <div class="contact__social-box">
        <p class="contact__social-label">Follow our journey</p>
        <div class="contact__social-icons" aria-label="Social media links">
          <a href="https://twitter.com/gddauk" target="_blank" rel="noopener noreferrer"
             class="contact__social-link" aria-label="Follow on X (Twitter)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
          <a href="https://linkedin.com/company/gdda-uk" target="_blank" rel="noopener noreferrer"
             class="contact__social-link" aria-label="Follow on LinkedIn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
          <a href="https://facebook.com/gddauk" target="_blank" rel="noopener noreferrer"
             class="contact__social-link" aria-label="Follow on Facebook">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="contact__form-wrap">
      <form
        class="contact__form"
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        novalidate
        aria-label="Contact form"
      >
        <div class="contact__form-field">
          <label class="contact__form-label" for="fullName">Full Name</label>
          <input
            id="fullName"
            type="text"
            class="contact__form-input"
            placeholder="John Doe"
            formControlName="fullName"
            autocomplete="name"
            [attr.aria-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched"
          />
        </div>

        <div class="contact__form-field">
          <label class="contact__form-label" for="email">Email Address</label>
          <input
            id="email"
            type="email"
            class="contact__form-input"
            placeholder="john&#64;example.com"
            formControlName="email"
            autocomplete="email"
            [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          />
        </div>

        <div class="contact__form-field">
          <label class="contact__form-label" for="specialty">Specialty / Profession</label>
          <input
            id="specialty"
            type="text"
            class="contact__form-input"
            placeholder="e.g. General Practitioner"
            formControlName="specialty"
            autocomplete="organization-title"
          />
        </div>

        <div class="contact__form-field">
          <label class="contact__form-label" for="message">Message</label>
          <textarea
            id="message"
            class="contact__form-textarea"
            placeholder="How can we assist you today?"
            formControlName="message"
            rows="4"
            [attr.aria-invalid]="form.get('message')?.invalid && form.get('message')?.touched"
          ></textarea>
        </div>

        <button type="submit" class="btn btn--navy contact__form-submit">
          Send Message
        </button>
      </form>
    </div>

  </div>
</section>
