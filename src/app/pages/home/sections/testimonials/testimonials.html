<section class="testimonials" aria-labelledby="testimonials-heading">
  <div class="testimonials__decoration" aria-hidden="true"></div>

  <div class="testimonials__inner">
    <!-- Quote icon -->
    <div class="testimonials__quote-icon" aria-hidden="true">
      <svg width="43" height="30" viewBox="0 0 43 30" fill="none" aria-hidden="true">
        <path d="M0 30V18.261C0 13.913 1.196 10.109 3.587 6.848 5.978 3.478 9.565 1.196 14.348 0l2.935 4.565C14.13 5.543 12.174 7.065 10.87 9.13 9.674 11.087 9.13 13.37 9.239 16H17V30H0Zm26 0V18.261c0-4.348 1.196-8.152 3.587-11.413C32.978 3.478 36.565 1.196 41.348 0l2.935 4.565C41.13 5.543 39.174 7.065 37.87 9.13c-1.196 1.957-1.74 4.24-1.631 6.87H44V30H26Z" fill="#FFDEA5"/>
      </svg>
    </div>

    <!-- Blockquote -->
    <figure class="testimonials__blockquote">
      <blockquote>
        <p class="testimonials__quote" id="testimonials-heading">
          "GDDA-UK is not just an association; it's a brotherhood of excellence. Through this
          network, we've managed to provide life-saving technology to underserved regions in
          Ghana while maintaining world-class standards here in the UK."
        </p>
      </blockquote>

      <!-- Author -->
      <figcaption class="testimonials__author">
        <div class="testimonials__avatar-wrap">
          <img
            ngSrc="/assets/images/testimonial-avatar.jpg"
            alt="Dr. Michael Boateng"
            width="64"
            height="64"
            class="testimonials__avatar"
          />
        </div>
        <div class="testimonials__author-info">
          <cite class="testimonials__author-name">Dr. Michael Boateng</cite>
          <span class="testimonials__author-role">Consultant Surgeon | GDDA-UK Board Member</span>
        </div>
      </figcaption>
    </figure>
  </div>
</section>
