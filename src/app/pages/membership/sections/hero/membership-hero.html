<section class="membership-hero" aria-label="Membership hero">
  <!-- Background image -->
  <div class="membership-hero__bg" aria-hidden="true">
    <img
      ngSrc="/assets/images/membership-hero-bg.jpg"
      alt=""
      fill
      priority
      class="membership-hero__bg-img"
    />
    <div class="membership-hero__gradient"></div>
  </div>

  <!-- Content -->
  <div class="membership-hero__content">
    <div class="membership-hero__content-inner">
      <div class="section-badge section-badge--gold membership-hero__badge">
        BECOME A MEMBER
      </div>

      <h1 class="membership-hero__heading">
        Your Professional Home Away From Home
      </h1>

      <p class="membership-hero__description">
        Join over 500 Ghanaian doctors and dentists across the UK. Build your career,
        give back to Ghana, and find community.
      </p>
    </div>
  </div>
</section>
