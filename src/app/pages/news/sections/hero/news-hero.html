<section class="news-hero" aria-label="News hero">
  <!-- Background image -->
  <div class="news-hero__bg" aria-hidden="true">
    <img
      ngSrc="/assets/images/news-hero-bg.jpg"
      alt=""
      fill
      priority
      class="news-hero__bg-img"
    />
    <div class="news-hero__gradient"></div>
  </div>

  <!-- Content -->
  <div class="news-hero__content">
    <div class="news-hero__content-inner">
      <div class="section-badge section-badge--gold news-hero__badge">
        NEWS &amp; INSIGHTS
      </div>

      <h1 class="news-hero__heading">Stories That Matter</h1>

      <p class="news-hero__description">
        The latest updates from GDDA-UK — member achievements, medical insights, outreach
        updates, and more from our community.
      </p>
    </div>
  </div>
</section>
