<section class="sponsorship-hero" aria-label="Sponsorship hero">
  <!-- Background image -->
  <div class="sponsorship-hero__bg" aria-hidden="true">
    <img
      ngSrc="/assets/images/sponsorship-bg.jpg"
      alt=""
      fill
      priority
      class="sponsorship-hero__bg-img"
    />
    <div class="sponsorship-hero__gradient"></div>
  </div>

  <!-- Content -->
  <div class="sponsorship-hero__content">
    <div class="sponsorship-hero__content-inner">
      <div class="section-badge section-badge--gold sponsorship-hero__badge">
        PARTNERSHIPS &amp; SPONSORSHIP
      </div>

      <h1 class="sponsorship-hero__heading">Partner With GDDA-UK</h1>

      <p class="sponsorship-hero__description">
        Support the UK's leading Ghanaian healthcare diaspora and connect your brand with a
        community dedicated to excellence, impact, and service.
      </p>
    </div>
  </div>
</section>
