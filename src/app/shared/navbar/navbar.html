<header class="navbar-wrapper" role="banner">
  <div class="navbar-inner">

    <!-- Logo -->
    <a routerLink="" class="navbar-brand gap-4" (click)="closeMobile()" aria-label="GDDA-UK">
      <span class="brand-logo" aria-hidden="true">LOGO</span>
      <span class="brand-tag">GDDA-UK</span>
    </a>

    <!-- Desktop nav -->
    <nav class="navbar-nav flex-row gap-4" role="navigation" aria-label="Main navigation">
      @for (link of navLinks; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="nav-link--active" class="nav-link text-capitalize" [attr.aria-current]="null">{{ link.label }}</a>
      }
    </nav>

    <!-- CTA + Hamburger -->
    <div class="navbar-actions">
      <a href="#membership" class="btn btn-udda-outline navbar-cta" aria-label="Membership">
        Membership
      </a>
      <a href="#donate" class="btn btn-udda-primary navbar-cta" aria-label="Donate to GDDA-UK">
        Donate
      </a>
      <button
        class="navbar-burger"
        type="button"
        [attr.aria-expanded]="mobileOpen()"
        aria-controls="mobile-nav"
        aria-label="Toggle mobile navigation"
        (click)="toggleMobile()">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>
    </div>
  </div>

  <!-- Mobile drawer -->
  <div
    id="mobile-nav"
    class="mobile-nav"
    [class.mobile-nav--open]="mobileOpen()"
    role="dialog"
    aria-modal="true"
    aria-label="Mobile navigation">

    <div class="mobile-nav__header">
      <span class="mobile-nav__brand">GDDA-UK</span>
      <button
        class="mobile-nav__close"
        type="button"
        aria-label="Close navigation"
        (click)="closeMobile()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="mobile-nav__divider"></div>

    <nav class="mobile-nav__links" aria-label="Mobile navigation links">
      @for (link of navLinks; track link.path; let i = $index) {
        <a [routerLink]="link.path" routerLinkActive="nav-link--active" class="mobile-nav__link" (click)="closeMobile()">
          <span class="mobile-nav__link-inner">
            <span class="mobile-nav__index">0{{ i + 1 }}</span>
            {{ link.label }}
          </span>
          <svg class="mobile-nav__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
      }
    </nav>

    <div class="mobile-nav__cta">
      <a href="#membership" class="btn btn-udda-outline" (click)="closeMobile()">Membership</a>
      <a href="#donate" class="btn btn-udda-primary" (click)="closeMobile()">Donate</a>
    </div>
  </div>

  <!-- Overlay -->
  @if (mobileOpen()) {
    <div
      class="mobile-overlay"
      role="presentation"
      (click)="closeMobile()"
      (keydown.escape)="closeMobile()">
    </div>
  }
</header>
